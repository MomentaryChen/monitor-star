worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS – re-resolve every 10 s so newly started replicas
    # are picked up without restarting nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format  main  '$remote_addr [$time_local] "$request" '
                      '$status $body_bytes_sent '
                      'upstream=$upstream_addr rt=${request_time}s';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    server {
        listen 80;
        server_name _;

        # Gateway health probe
        location = /gateway/health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Order Service: route by path prefix.
        location /orders/ {
            set $upstream http://order-service:8080;
            rewrite ^/orders/(.*)$ /$1 break;
            proxy_pass            $upstream;
            proxy_http_version    1.1;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # Round-robin across all springboot-app replicas (default route).
        # Assigning the upstream to a variable forces per-request DNS lookup,
        # which lets Docker DNS rotate among all running containers.
        location / {
            set $upstream http://springboot-app:8080;
            proxy_pass            $upstream;
            proxy_http_version    1.1;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}

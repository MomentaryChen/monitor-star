auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  # Docker 容器可能會輸出較舊的時間戳（例如重啟後補寫、或容器內時間漂移），
  # 若要「看所有 docker logs」需要放寬此限制，避免 Loki 400 拒收導致看板無資料。
  reject_old_samples_max_age: 8760h   # 365 days
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32

# "entry too far behind" 的接受範圍約為 (max_chunk_age / 2)。
# 若需要導入/查看時間戳較舊的 docker logs，需放寬 max_chunk_age。
ingester:
  # 需要涵蓋更久以前的 docker logs（例如 2025-08），需進一步放寬 max_chunk_age。
  # Loki 的 "too far behind" 約以 (max_chunk_age / 2) 計算可接受回溯窗。
  max_chunk_age: 20000h   # ~833 days

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

ruler:
  alertmanager_url: http://localhost:9093
